apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: es-censor
spec:
  version: 8.18.8
  {{- if .Values.es.secureSettings }}
  secureSettings:
    - secretName: gcs-credentials
  {{- end }}
  nodeSets:
  # ---------------------------------------------------------
  # 1. Masters Node: เน้นบริหารจัดการ ไม่เก็บข้อมูล
  # ---------------------------------------------------------
  - name: masters
    count: {{ .Values.es.master.count }}
    config:
      node.store.allow_mmap: true
      node.roles: ["master"]
      cluster.initial_master_nodes: ["es-censor-es-masters-0"]
    podTemplate:
      spec:
        initContainers:
        - name: sysctl
          securityContext:
            privileged: true
            runAsUser: 0
          command: ['sh', '-c', 'sysctl -w vm.max_map_count=562144']
        containers:
        - name: elasticsearch
          env:
          - name: ES_JAVA_OPTS
            value: "{{ .Values.es.master.javaOpts }}"
          resources:
            requests:
              memory: {{ .Values.es.master.memRequest }}
              cpu: {{ .Values.es.master.cpuRequest }}
            limits:
              memory: {{ .Values.es.master.memLimit }}
              cpu: {{ .Values.es.master.cpuLimit }}
    volumeClaimTemplates:
    - metadata:
        name: elasticsearch-data
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.es.master.storage }}

  # ---------------------------------------------------------
  # 2. Data Node: รับโหลดหนัก เก็บข้อมูล ทำงาน Snapshot
  # ---------------------------------------------------------
  - name: data
    count: {{ .Values.es.data.count }}
    config:
      node.store.allow_mmap: true
      # เพิ่ม data_content และ data_hot เพื่อรองรับ Index ทั่วไปใน v8.x
      node.roles: ["data", "data_content", "data_hot", "data_warm", "data_cold", "ingest"]
    podTemplate:
      spec:
        initContainers:
        - name: sysctl
          securityContext:
            privileged: true
            runAsUser: 0
          command: ['sh', '-c', 'sysctl -w vm.max_map_count=562144']
        containers:
        - name: elasticsearch
          env:
          - name: ES_JAVA_OPTS
            value: "{{ .Values.es.data.javaOpts }}"
          resources:
            requests:
              memory: {{ .Values.es.data.memRequest }}
              cpu: {{ .Values.es.data.cpuRequest }}
            limits:
              memory: {{ .Values.es.data.memLimit }}
              cpu: {{ .Values.es.data.cpuLimit }}
    volumeClaimTemplates:
    - metadata:
        name: elasticsearch-data
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.es.data.storage }}
  auth:
    fileRealm:
    - secretName: es-basic-authen

---
apiVersion: kibana.k8s.elastic.co/v1
kind: Kibana
metadata:
  name: es-censor
spec:
  version: 8.18.8
  count: {{ .Values.kibana.count }}
  elasticsearchRef:
    name: es-censor
  podTemplate:
    spec:
      containers:
      - name: kibana
        resources:
          requests:
            memory: {{ .Values.kibana.memRequest }}
          limits:
            memory: {{ .Values.kibana.memLimit }}
  config:
    monitoring.ui.ccs.enabled: false
    server.basePath: "/tools/kibana"
    server.rewriteBasePath: true
