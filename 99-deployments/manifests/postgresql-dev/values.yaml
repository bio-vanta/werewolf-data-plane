
postgresql:
  enabled: true
  fullnameOverride: postgresql
  auth:
    database: pp-dev
    existingSecret: postgres-secret
    secretKeys:
      adminPasswordKey: adminPasswordKey
  primary:
    persistence:
      size: 5Gi
    resources:
      requests:
        memory: "1Gi"
        cpu: "300m"
      limits:
        memory: "2Gi"
        cpu: "1"

  image:
    registry: docker.io
    repository: biovanta2002/postgresql
    tag: "v16.2.0-2"
